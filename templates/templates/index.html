<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyAI Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#080b14;color:white;height:100vh;display:flex;flex-direction:column;}
.header{padding:16px 24px;background:rgba(16,24,40,.95);border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;}
.header h1{font-size:20px;background:linear-gradient(135deg,#8b5cf6,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logout{padding:8px 16px;border-radius:10px;border:1px solid #2c3a56;background:transparent;color:#94a3b8;cursor:pointer;}
.chat-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
.message{max-width:80%;padding:14px 18px;border-radius:18px;line-height:1.6;}
.user-msg{background:linear-gradient(135deg,#8b5cf6,#3b82f6);align-self:flex-end;}
.bot-msg{background:rgba(16,24,40,.95);border:1px solid rgba(255,255,255,.08);align-self:flex-start;}
.input-area{padding:16px 24px;background:rgba(16,24,40,.95);border-top:1px solid rgba(255,255,255,.08);display:flex;gap:12px;}
textarea{flex:1;padding:14px;border-radius:14px;border:1px solid #2c3a56;background:#182234;color:white;font-size:15px;outline:none;resize:none;height:52px;}
button{padding:14px 24px;border:none;border-radius:14px;background:linear-gradient(135deg,#8b5cf6,#3b82f6);color:white;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<div class="header">
  <h1>⚡ StudyAI Pro</h1>
  <a href="/logout"><button class="logout">Logout</button></a>
</div>
<div class="chat-area" id="chat"></div>
<div class="input-area">
  <textarea id="prompt" placeholder="Ask anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
  <button onclick="send()">Send</button>
</div>
<script>
let history=[];
async function send(){
  const prompt=document.getElementById('prompt').value.trim();
  if(!prompt)return;
  addMsg(prompt,'user-msg');
  document.getElementById('prompt').value='';
  history.push({role:'user',content:prompt});
  const res=await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,history})});
  const data=await res.json();
  const reply=data.best||data.error||'Error';
  addMsg(reply,'bot-msg');
  history.push({role:'assistant',content:reply});
}
function addMsg(text,cls){
  const div=document.createElement('div');
  div.className='message '+cls;
  div.textContent=text;
  document.getElementById('chat').appendChild(div);
  div.scrollIntoView();
}
</script>
</body>
</html>
